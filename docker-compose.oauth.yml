# OAuth overlay: mount host ChatGPT auth into the API container (read-only).
# OAUTH_AUTH_HOST_PATH is set by scripts/compose_env.sh (via start.sh / stop.sh).
services:
  api:
    volumes:
      - ${OAUTH_AUTH_HOST_PATH}:/root/.oauth_codex/auth.json:ro
    environment:
      LLM_AUTH_MODE: chatgpt_oauth
      CODEX_OAUTH_AUTH_PATH: /root/.oauth_codex/auth.json
