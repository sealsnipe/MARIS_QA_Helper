{% extends "layout.html" %}

{% block title %}Rollen · MARIS - Q/A Helper{% endblock %}
{% block page_title %}Rollen{% endblock %}

{% block content %}
<section class="panel customer-admin-panel">
  <div class="section-header-with-info">
    <span class="section-header-label">Rollen verwalten</span>
    <span class="info-tip"
          data-tip="Rollen sind Presets für Admin-Rechte und Kundenzuordnung. Mit „Neue Kunden auto-hinzufügen“ erhalten zugewiesene Benutzer neue Mandanten automatisch.">
      i
    </span>
  </div>

  <form id="role-create-form" class="ingest-form customer-create-form">
    <h2>Neue Rolle</h2>
    <div id="role-create-options" class="role-options-panel">
      <label class="role-name-field">
        <span class="ingest-field-label">Name</span>
        <input type="text" id="role-create-name" maxlength="120" placeholder="z. B. Support BG Frankfurt" required>
      </label>
      <div class="role-toggle-group" role="group" aria-label="Rollenoptionen">
        <button type="button" class="role-toggle-btn is-inactive" data-toggle="admin" aria-pressed="false" title="Administrator — voller Systemzugriff">ADM</button>
        <button type="button" class="role-toggle-btn is-inactive" data-toggle="auto-customers" aria-pressed="false" title="Neue Kunden automatisch zuweisen">AK</button>
      </div>
    </div>
    <fieldset class="user-customers-fieldset">
      <legend>Kunden (Preset)</legend>
      <div id="role-create-customers" class="user-customer-checkboxes"></div>
    </fieldset>
    <button type="submit" id="role-create-submit">Rolle anlegen</button>
    <p id="role-create-status" class="status" aria-live="polite"></p>
  </form>

  <div class="customer-list-wrap admin-list-panel">
    <h2>Rollen <span id="role-count" class="muted">(0)</span></h2>
    <table class="customer-table" id="role-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Kunden</th>
          <th>Admin</th>
          <th>Auto-Kunden</th>
          <th>Aktionen</th>
        </tr>
      </thead>
      <tbody id="role-table-body"></tbody>
    </table>
    <p id="role-empty" class="muted">Noch keine Rollen.</p>
  </div>

  <p id="role-list-status" class="status" aria-live="polite"></p>
</section>
{% endblock %}
