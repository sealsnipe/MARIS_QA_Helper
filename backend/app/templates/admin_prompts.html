{% extends "layout.html" %}

{% block title %}Systemprompts · MARIS - Q/A Helper{% endblock %}
{% block page_title %}Systemprompts{% endblock %}

{% block content %}
<section class="panel chat-panel full-page">
  <div class="section-header-with-info">
    <span class="section-header-label">Systemprompts verwalten</span>
    <span class="info-tip"
          data-tip="Globaler Prompt gilt für alle Kunden. Kundenspezifischer Prompt wird ergänzend angehängt.">
      i
    </span>
  </div>
  <p class="admin-scope-indicator">Bearbeite: <strong id="admin-scope-label"></strong></p>
  <form id="prompt-form" class="ingest-form">
    <label>
      Prompt-Text
      <textarea id="prompt-content" rows="16" placeholder="System-Prompt…"></textarea>
    </label>
    <button type="submit" id="prompt-submit">Speichern</button>
    <p id="prompt-status" class="status" aria-live="polite"></p>
  </form>
</section>
{% endblock %}
