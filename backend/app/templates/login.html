{% extends "base.html" %}

{% block title %}Anmelden — MARIS - Q/A Helper{% endblock %}

{% block content %}
<section class="card login-card">
  <div class="login-brand">
    <img src="/static/brand-banner.svg?v=3" alt="" class="login-brand-banner" width="240" height="58">
    <p class="login-brand-title">MARIS Q/A Helper</p>
  </div>
  <p class="subtitle">Support-Wissensassistent</p>

  {% if error %}
  <p class="error" role="alert">E-Mail oder Passwort falsch.</p>
  {% endif %}

  <form method="post" action="/login" class="form">
    <label>
      E-Mail
      <input type="email" name="email" required autocomplete="username">
    </label>
    <label>
      Passwort
      <input type="password" name="password" required autocomplete="current-password">
    </label>
    <button type="submit">Anmelden</button>
  </form>
</section>
{% endblock %}
