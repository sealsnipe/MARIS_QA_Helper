name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend (editable) + deps
        run: |
          python -m pip install --upgrade pip
          pip install -e backend

      - name: Run tests (no network; mocks in conftest)
        run: |
          cd backend && PYTHONPATH=. python -m pytest -q

  # Optional smoke: ensure Docker image builds (catches Dockerfile drift)
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build (backend image, repo-root context wie docker-compose)
        run: docker build -f backend/Dockerfile -t maris-qa-helper-test .
